<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haider Express</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body
    class="bg-slate-50 text-slate-800 font-sans antialiased flex flex-col min-h-screen"
  >
    <header class="bg-[#2bc4c3] text-black sticky top-0 z-50 shadow-md">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between"
      >
        <a
          href="index.html"
          class="text-2xl font-black tracking-wider flex items-center gap-1"
        >
          HAIDER<span>EXPRESS</span>
        </a>

        <nav class="hidden md:flex space-x-6 font-bold text-sm">
          <a
            href="index.html"
            class="hover:bg-white/10 px-3 py-1.5 rounded-lg transition"
            >Home</a
          >
          <a
            href="cart.html"
            class="hover:bg-white/10 px-3 py-1.5 rounded-lg transition"
            >Cart</a
          >
          <a
            href="orders.html"
            class="bg-white/10 px-3 py-1.5 rounded-lg transition"
            >Orders</a
          >
          <a
            href="about.html"
            class="hover:bg-white/10 px-3 py-1.5 rounded-lg transition"
            >About Us</a
          >
          <a
            href="contact.html"
            class="hover:bg-white/10 px-3 py-1.5 rounded-lg transition"
            >Contact Us</a
          >
        </nav>

        <div class="flex items-center space-x-4">
          <a href="cart.html">
            <button
              class="bg-amber-400 text-slate-900 font-bold px-4 py-2 cursor-pointer rounded-xl flex items-center gap-2 hover:bg-amber-300 shadow-sm transition"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2.5"
                stroke="currentColor"
                class="w-5 h-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"
                />
              </svg>
              <span
                class="bg-slate-900 text-white rounded-full text-xs px-2 py-0.5 font-black"
                >0</span
              >
            </button>
          </a>
        </div>
      </div>
    </header>

    <!-- Mobile Nav Row (visible on mobile only) -->
    <nav
      class="md:hidden bg-[#2bc4c3] border-t border-white/20 px-4 py-2 overflow-x-auto sticky top-20 z-40"
    >
      <div class="flex gap-2 w-max">
        <a
          href="index.html"
          class="text-xs font-bold whitespace-nowrap px-4 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition"
          >🏠 Home</a
        >
        <a
          href="cart.html"
          class="text-xs font-bold whitespace-nowrap px-4 py-2 rounded-xl hover:bg-white/20 transition"
          >🛒 Cart</a
        >
        <a
          href="orders.html"
          class="text-xs font-bold whitespace-nowrap px-4 py-2 rounded-xl bg-white/20 transition"
          >📦 Orders</a
        >
        <a
          href="about.html"
          class="text-xs font-bold whitespace-nowrap px-4 py-2 rounded-xl hover:bg-white/20 transition"
          >ℹ️ About</a
        >
        <a
          href="contact.html"
          class="text-xs font-bold whitespace-nowrap px-4 py-2 rounded-xl hover:bg-white/20 transition"
          >📞 Contact</a
        >
      </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full">
      <h1 class="text-3xl font-black text-slate-900 tracking-tight mb-2">
        Order History
      </h1>
      <p class="text-slate-400 text-xs mb-8">
        Review and track the fulfillment parameters of your purchases.
      </p>

      <div id="orders-log-container" class="space-y-6"></div>
    </main>

    <footer
      class="bg-slate-950 text-slate-400 py-8 border-t border-slate-900 text-center text-sm mt-24"
    >
      <p>&copy; 2026 Haider Express Collection. All rights reserved.</p>
    </footer>

    <script src="data/products.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
