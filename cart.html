<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>CASE & CARRY | Premium Travel Gear</title>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <header
      class="bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-slate-100"
    >
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between"
      >
        <a
          href="index.html"
          class="text-2xl font-black tracking-tight text-slate-900 group li"
        >
          CASE<span
            class="text-emerald-600 inline-block group-hover:rotate-12 transition-transform duration-300 mx-0.5"
            >&amp;</span
          >CARRY
        </a>
        <nav class="hidden md:flex space-x-8 font-medium text-slate-600">
          <a href="index.html" class="hover:text-emerald-600 transition-colors"
            >Home</a
          >
          <a
            href="index.html#shop"
            class="hover:text-emerald-600 transition-colors"
            >Backpacks &amp; Bags</a
          >
          <a href="about.html" class="hover:text-emerald-600 transition-colors"
            >Our Story</a
          >
        </nav>
        <div class="flex items-center space-x-5">
          <a href="cart.html" class="text-emerald-600 block relative">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-6 h-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"
              />
            </svg>
          </a>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20">
      <div class="mb-12">
        <h1 class="text-4xl font-black text-slate-900 tracking-tight">
          Your Carry Cart
        </h1>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 items-start">
        <div class="lg:col-span-2 space-y-6">
          <div
            class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center gap-6"
          >
            <div
              class="w-24 h-24 bg-slate-100 rounded-xl flex items-center justify-center text-4xl"
            >
              🎒
            </div>
            <div class="flex-1 flex justify-between items-center">
              <div>
                <h3 class="font-bold text-lg text-slate-900">
                  Nomad Commuter Pack
                </h3>
                <p class="text-slate-500 text-sm">Stealth Black</p>
              </div>
              <span class="text-xl font-black text-slate-900">$79.00</span>
            </div>
          </div>
          <a
            href="index.html"
            class="inline-block text-slate-600 hover:text-emerald-600 font-bold text-sm"
          >
            &larr; Continue Shopping
          </a>
        </div>

        <div
          class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm space-y-6"
        >
          <h2 class="text-2xl font-black text-slate-900">Summary</h2>
          <div
            class="flex justify-between border-b pb-4 text-sm font-medium text-slate-600"
          >
            <span>Subtotal</span
            ><span class="text-slate-900 font-bold">$79.00</span>
          </div>
          <div class="flex justify-between items-end">
            <span class="font-bold text-slate-800">Total</span
            ><span class="text-3xl font-black text-slate-900">$79.00</span>
          </div>
          <button
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all"
          >
            Proceed to Checkout
          </button>
        </div>
      </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center"
      >
        <p class="text-sm">&copy; 2026 CASE&amp;CARRY. All rights reserved.</p>
        <div class="flex space-x-6 text-sm">
          <a href="about.html" class="hover:text-white">Our Story</a>
        </div>
      </div>
    </footer>
  </body>
</html>
